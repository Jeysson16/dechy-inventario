<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport & Mobile ── -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── PWA / Theme ── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="application-name" content="Dechy" />

    <!-- ── Apple PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Dechy" />
    <link rel="apple-touch-icon" href="/img/logojieda.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/img/logojieda.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/logojieda.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/img/logojieda.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" href="/img/logojieda.png" />
    <link rel="shortcut icon" href="/img/logojieda.png" />

    <!-- ── SEO / Social ── -->
    <meta
      name="description"
      content="Dechy — Tienda de materiales de construcción y acabados. Inventario en tiempo real, calculadora de cielo raso y más."
    />
    <meta property="og:title" content="Dechy Store" />
    <meta
      property="og:description"
      content="Materiales de construcción y acabados — compra online con envío y seguimiento en tiempo real."
    />
    <meta property="og:image" content="/img/logojieda.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />

    <title>Dechy — Inventario & Tienda</title>

    <!-- ── PWA install & SW registration ── -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => {
              console.log("[PWA] Service Worker registrado:", reg.scope);
            })
            .catch((err) => {
              console.warn("[PWA] SW error:", err);
            });
        });
      }
    </script>

    <!-- ── Global mobile base styles ── -->
    <style>
      /* Safe-area insets for notched phones */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }

      /* Prevent horizontal overflow globally */
      html,
      body {
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
      }

      /* Improve tap targets — minimum 44px */
      button,
      a,
      [role="button"] {
        min-height: 44px;
        min-width: 44px;
      }

      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Better touch scrolling on iOS */
      * {
        -webkit-overflow-scrolling: touch;
      }

      /* Remove tap highlight on mobile */
      * {
        -webkit-tap-highlight-color: transparent;
      }

      /* Prevent zoom on input focus on iOS */
      input,
      select,
      textarea {
        font-size: max(16px, 1em);
      }

      /* Splash screen background while app loads */
      body {
        background-color: #0f172a;
      }
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background: #0f172a url("/img/logojieda.png") center / 80px no-repeat;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
